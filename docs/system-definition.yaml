# chill-dogs System Definition
# Source of truth for site intent, page types, modules, and conversion architecture.
#
# Maintenance rule (mandatory):
# - Update this file whenever pages, routes, page types, module stacks,
#   navigation, or conversion flow changes.
# - Any AI-assisted page additions/changes must keep this file current.

site_system:
  status: "active"
  as_of: "2026-04-14"
  owner: "chill-dogs"
  purpose: "Define the website as a modular conversion system and keep implementation aligned."

  maintenance_policy:
    required_on_change:
      - "new page added"
      - "page removed"
      - "page type changed"
      - "route changed"
      - "navigation changed"
      - "module stack changed"
      - "analytics funnel changed"
    enforced_by:
      - "AGENTS.md"
      - "CLAUDE.md"

  keystone_metrics:
    primary: "Amazon affiliate revenue (qualified outbound clicks to purchases)"
    secondary: "collector_to_converter_click rate"

  page_inventory:
    - name: "Home"
      type: "attractor"
      target_action: "Route visitors into cooling, calming, comforting, crate-training, and road-trip crate paths"
      metric: "hero_click_cooling + hero_click_calming CTR + comfort block clicks"
      notes: >
        Home page includes a dusty rose color block introducing the Comfort & Rest collector
        with tagline "Settle in." — positioned between HomepageHero and the start-prompt section.
        The latest/guide lists include How to Crate Train Your Dog and Best Travel Crates for Road Trips
        to connect informational crate intent with the new crate converter path.
        A homepage-inline email signup block sits below HomepageBody as a secondary capture path.

    - name: "Cooling"
      type: "collector"
      collector_subtype: "section"
      target_action: "Route heat-intent traffic to cooling converters"
      metric: "collector_to_converter_click to cooling converters"

    - name: "Calming"
      type: "collector"
      collector_subtype: "section"
      target_action: "Route anxiety-intent traffic to calming converters"
      metric: "collector_to_converter_click to calming converters"
      notes: "Collector routes directly to general calming picks, ThunderShirt alternatives, and the travel-focused car-anxiety converter."

    - name: "Cooling converters"
      type: "converter"
      target_action: "Drive affiliate outbound clicks"
      metric: "amazon_outbound_click rate"
      routes:
        - "/cooling/best-cooling-products-for-dogs/"
        - "/cooling/cooling-mats/"
        - "/cooling/cooling-bandanas/"
        - "/cooling/cooling-vests/"
        - "/cooling/freezable-dog-toys/"
        - "/cooling/car-cooling-for-dogs/"

    - name: "Calming converters"
      type: "converter"
      target_action: "Drive affiliate outbound clicks"
      metric: "amazon_outbound_click rate"
      routes:
        - "/calming/best-calming-products-for-anxious-dogs/"
        - "/calming/best-thundershirt-alternatives/"
        - "/calming/car-anxiety-for-dogs/"

    - name: "Keep a Dog Cool in a Car"
      type: "collector"
      collector_subtype: "article"
      target_action: "Route car-heat-intent traffic to cooling converters"
      metric: "collector_to_converter_click to car cooling and related converters"
      routes:
        - "/cooling/keep-dog-cool-in-car/"

    - name: "How Hot Is Too Hot for Dogs"
      type: "collector"
      collector_subtype: "article"
      target_action: "Route heat-safety-intent traffic to cooling converters"
      metric: "collector_to_converter_click to cooling converters"
      routes:
        - "/cooling/how-hot-is-too-hot-for-dogs/"

    - name: "How Much Do Dogs Sleep"
      type: "collector"
      collector_subtype: "article"
      pillar: "comfort"
      target_action: "Route sleep-intent traffic to calming and orthopedic bed converters"
      metric: "collector_to_converter_click to comfort converters"
      routes:
        - "/comforting/how-much-do-dogs-sleep/"

    - name: "Relaxation converters"
      type: "converter"
      pillar: "comfort"
      pillar_tagline: "Rest. Recovery. Relaxation."
      target_action: "Drive affiliate outbound clicks on dog beds and dog crates"
      metric: "amazon_outbound_click rate"
      routes:
        - "/comforting/best-calming-dog-beds/"
        - "/comforting/best-orthopedic-dog-beds/"
        - "/comforting/best-puppy-crates/"
        - "/comforting/best-anxiety-dog-crates/"
        - "/comforting/best-travel-crates-for-road-trips/"
        - "/comforting/best-airline-crates-for-flying-with-your-dog/"
        - "/comforting/best-airline-approved-dog-carriers/"
        - "/comforting/best-dog-travel-bags-for-flying/"
        - "/comforting/best-furniture-dog-crates/"
        - "/comforting/best-heavy-duty-dog-crates/"
      notes: >
        Comfort collector routes to calming beds, orthopedic beds, puppy crates, anxiety crates, travel crates,
        airline crates, furniture crates, and heavy-duty crates.
        The crate-training collector article now routes into the airline, furniture, and heavy-duty crate paths as well.
        Placeholder product entries (ASINs B0D5B56X9V, B0DTH4195V) need
        to be identified and updated in src/data/relaxation-products.ts.

    - name: "Crate Training for Dogs"
      type: "collector"
      collector_subtype: "article"
      target_action: "Route crate-training-intent traffic to calming and comfort converters"
      metric: "collector_to_converter_click to calming and comfort converters"
      routes:
        - "/calming/crate-training-for-dogs/"

    - name: "Road Trip Chill Kit"
      type: "collector"
      collector_subtype: "article"
      target_action: "Route mixed intent to cooling and calming converters"
      metric: "collector_to_converter_click split by destination"
      routes:
        - "/travel/dog-road-trip-gear/"

    - name: "How to Fly With a Dog"
      type: "collector"
      collector_subtype: "article"
      target_action: "Route air-travel intent to calming converters and comfort bed converters"
      metric: "collector_to_converter_click to calming and comfort converters"
      routes:
        - "/travel/how-to-fly-with-a-dog/"
      notes: "Informational air-travel guide; attributes facts to TSA, USDA APHIS, AVMA, DOT, CDC, and AAHA. No product roundup. Internal links to calming and comfort converters."

    - name: "How Much Do Dogs Sleep"
      type: "collector"
      collector_subtype: "article"
      target_action: "Route dog sleep intent to comfort converters (calming beds, orthopedic beds)"
      metric: "collector_to_converter_click to comfort converters"
      routes:
        - "/comforting/how-much-do-dogs-sleep/"

    - name: "Rhys Ran Away (Bishop Peak)"
      type: "collector"
      target_action: "Route story-driven search traffic to GPS tracker comparison converter"
      metric: "collector_to_converter_click to /gear/best-dog-gps-trackers/"
      routes:
        - "/travel/rhys-ran-away-bishop-peak/"
      notes: "Story-driven narrative collector; introduces tracker type education; primary CTA to trackingTop"

    - name: "GPS Tracker comparison"
      type: "converter"
      target_action: "Drive affiliate outbound clicks for GPS tracker products"
      metric: "amazon_outbound_click rate (placeholder CTAs pending affiliate setup)"
      routes:
        - "/gear/best-dog-gps-trackers/"

    - name: "Fi Dog Collar Review"
      type: "converter"
      target_action: "Drive affiliate outbound clicks for Fi collar; route off-grid seekers to Garmin page"
      metric: "amazon_outbound_click rate (placeholder CTAs pending affiliate setup)"
      routes:
        - "/gear/fi-dog-collar-review/"

    - name: "Garmin Dog Tracking Collars"
      type: "collector"
      target_action: "Route off-grid tracking intent to GPS tracker comparison"
      metric: "collector_to_converter_click to /gear/best-dog-gps-trackers/"
      routes:
        - "/gear/garmin-dog-tracking-collars/"

    - name: "AirTag for Dogs"
      type: "collector"
      target_action: "Route AirTag searchers to GPS tracker comparison with accurate expectation-setting"
      metric: "collector_to_converter_click to /gear/best-dog-gps-trackers/"
      routes:
        - "/gear/airtag-for-dogs/"

    - name: "What to Do If Your Dog Runs Away"
      type: "collector"
      target_action: "Route safety-intent traffic to GPS tracker comparison and Rhys story"
      metric: "collector_to_converter_click to /gear/best-dog-gps-trackers/ and /travel/rhys-ran-away-bishop-peak/"
      routes:
        - "/safety/what-to-do-if-your-dog-runs-away/"

    - name: "Informer pages"
      type: "informer"
      target_action: "Trust and compliance clarity"
      metric: "No conversion obstruction"
      routes:
        - "/admin/products/"
        - "/content-sitemap/"
        - "/about/"
        - "/contact/"
        - "/privacy-policy/"
        - "/terms/"
        - "/affiliate-disclosure/"
        - "/subscribe/thanks/"
        - "/subscribe/confirmed/"
      notes: "/admin/products/ is the canonical product inventory review page. Every product in any product data file must flow into this page through src/data/product-catalog.ts; do not hardcode product rows in the admin route. /content-sitemap/ is a hidden editor page that previews each listed route with final built share metadata, including post-build OG image rewrites."

  modules:
    workhorse:
      - "BaseLayout"
      - "Hero"
      - "HeroExperiment"
      - "CoolingConverterPage"
      - "CalmingConverterPage"
      - "RelaxationConverterPage"
      - "CollectorBody"
      - "ComparisonTable"
      - "CoolingProductGrid"
      - "CoolingProductCard"
      - "CalmingProductCard"
      - "RelaxationProductCard"
      - "FAQ"
      - "Disclosure"
      - "InternalLinkStrip"
      - "Toc"
      - "RelatedGuides"
    showstopper:
      - "CoolingHubHeroDesert"
      - "CalmingHubHeroFireworks"
      - "404 visual page"
    high_touch:
      - "HomepageHero variants"
      - "collector variant routes (/v/, /cooling/v/, /calming/v/)"
      - "Road Trip collector narrative"

  nav:
    primary_links:
      - "/"
      - "/cooling/"
      - "/calming/"
      - "/comforting/"
      - "/about/"

  footer:
    sections:
      - "Explore: cooling, calming, comforting"
      - "Company: about, contact"
      - "Legal: privacy-policy, terms, affiliate-disclosure"
      - "Newsletter signup on non-converter pages only"
    final_cta: "Persistent affiliate disclosure, trust reinforcement, and secondary email capture on non-converter pages"

  conversion_flow:
    steps:
      - "Entry on attractor or collector"
      - "Above-the-fold route to converter"
      - "Comparison and product rationale"
      - "Affiliate outbound click"
      - "Amazon purchase completion"
    friction_points:
      - "Route or tracking metadata mismatches"
      - "Duplicated page scaffolding that drifts over time"
      - "Unused modules that create implementation confusion"
      - "Collector pages without clear converter paths"

  email_capture_flow:
    scope: "Homepage inline signup + footer signup on non-converter pages"
    provider: "Buttondown"
    events:
      - "email_signup_view"
      - "email_signup_start"
      - "email_signup_submit"
      - "pageview:/subscribe/thanks/"
      - "pageview:/subscribe/confirmed/"
    notes: >
      Converters intentionally exclude the footer signup so affiliate pages stay single-purpose.
      /subscribe/thanks/ and /subscribe/confirmed/ are informer pages, noindex, excluded from sitemap discovery,
      and include a minimal Chill-Dogs logo link back to the homepage without restoring full site chrome.

  product_data:
    product_catalog: "src/data/product-catalog.ts — normalized admin inventory across every product data source; /admin/products/ must consume this data module and remain complete whenever products are added"
    cooling_products: "src/data/cooling-products.ts — 15 products with ASIN, affiliate URL, and image thumbnails"
    calming_products: "src/data/calming-products.ts — 13 products with ASIN, affiliate URL, and image thumbnails"
    relaxation_products: "src/data/relaxation-products.ts — 41 products (calming beds, orthopedic beds, crates, travel beds) with ASIN, affiliate URL, and image thumbnails"
    tracking_products: "src/data/tracking-products.ts — 8 tracker products and 1 accessory product across cellular/off-grid/bluetooth/accessory types"
    raw_api_cache: "src/data/amazon-products/*.json — full SearchAPI Amazon Product responses per ASIN"

  architecture:
    frontend: "Astro 5 static site with scoped CSS and reusable modules"
    cms: "None (code-first content/config in repository)"
    hosting: "Static build deployment"
    seo_strategy: "collector captures intent; converter monetizes intent; variant routes remain canonicalized and noindex"

  redirects:
    # Production: vercel.json → redirects array (true HTTP 301 at Vercel edge).
    # Local dev/preview: astro.config.mjs → redirects block (meta-refresh fallback).
    # Add an entry here any time a live/indexed URL is changed.
    - from: "/travel/rhys-road-trip-chill-kit/"
      to: "/travel/dog-road-trip-gear/"
      reason: "Slug updated to target primary keyword 'dog road trip gear'; old URL was indexed."
      date: "2026-03-20"

  analytics:
    primary_events:
      - "amazon_outbound_click"
      - "collector_to_converter_click"
      - "hero_click_cooling"
      - "hero_click_calming"
      - "hero_cta_click"
      - "hero_impression"
      - "toc_click"
    funnel_definition: "collector or attractor entry -> converter click -> amazon_outbound_click"
